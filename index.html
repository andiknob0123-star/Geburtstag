<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>18. Geburtstag Einladung 🎉</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
      color: white;
      overflow: hidden;
    }

    /* Glow Background */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(122,60,255,0.4), transparent 60%);
      top: -200px;
      left: -200px;
      filter: blur(80px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,200,255,0.25), transparent 60%);
      bottom: -200px;
      right: -200px;
      filter: blur(80px);
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
      padding: 40px 30px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .highlight {
      color: #7a3cff;
      font-weight: 600;
    }

    hr {
      border: none;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 25px 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    input, select, textarea {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
    }

    textarea {
      resize: none;
      min-height: 80px;
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #7a3cff, #00c6ff);
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(122,60,255,0.4);
    }

    .small {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>🎉 18. Geburtstag 🎉</h1>
    <div class="subtitle">Du bist herzlich eingeladen</div>

    <p>
      Hey zusammen 👋<br><br>
      ich werde am <span class="highlight">14. Juli</span> endlich <span class="highlight">18 Jahre alt</span> und würde mich sehr freuen, wenn ihr dabei seid.
    </p>

    <p>
      🕒 <span class="highlight">15:00 Uhr</span><br>
      ☕ Kaffee & Kuchen<br>
      🎈 Danach gemütliches Beisammensein
    </p>

    <hr>

    <h3>Zu- oder Absage</h3>

    <form onsubmit="sendWhatsApp(event)">

      <input type="text" id="name" placeholder="Dein Name" required>

      <select id="zusage" required>
        <option value="">Bitte auswählen</option>
        <option value="Ich komme 👍">Ich komme 👍</option>
        <option value="Ich kann leider nicht 😢">Ich kann leider nicht 😢</option>
      </select>

      <textarea id="nachricht" placeholder="Nachricht (optional)"></textarea>

      <button type="submit">Über WhatsApp senden</button>

    </form>

    <div class="small">
      Antwort wird direkt an WhatsApp gesendet
    </div>

  </div>

  <script>
    function sendWhatsApp(event) {
      event.preventDefault();

      const name = document.getElementById("name").value;
      const zusage = document.getElementById("zusage").value;
      const nachricht = document.getElementById("nachricht").value;

      let text =
        "🎉 Geburtstags-Rückmeldung%0A%0A" +
        "Name: " + name + "%0A" +
        "Antwort: " + zusage;

      if (nachricht.trim() !== "") {
        text += "%0A%0ABemerkung: " + nachricht;
      }

      const nummer = "491751170155";

      const url = "https://wa.me/" + nummer + "?text=" + text;

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
